# Production Docker Compose — standalone (ports exposés)
# Usage: docker compose --env-file .env up -d
#
# Set IMAGE_TAG to deploy a specific CI build (e.g. dev-abc1234, 1.3.0).
# Defaults to latest.

services:
  server:
    image: ghcr.io/yvan2xero/tkams-server:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-grades}:${POSTGRES_PASSWORD:-grades}@postgres:5432/${POSTGRES_DB:-grades}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-change-me}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      BETTER_AUTH_COOKIE_SAMESITE: ${BETTER_AUTH_COOKIE_SAMESITE:-lax}
      BETTER_AUTH_COOKIE_SECURE: ${BETTER_AUTH_COOKIE_SECURE:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4173}
      SERVER_PUBLIC_URL: ${SERVER_PUBLIC_URL:-http://localhost:3000}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      STORAGE_LOCAL_ROOT: /usr/src/app/apps/server/storage/uploads
      STORAGE_LOCAL_PUBLIC_PATH: /uploads
      RUN_SEED: "true"
    ports:
      - "${SERVER_PORT:-3000}:3000"
    volumes:
      - server_uploads:/usr/src/app/apps/server/storage/uploads
      - ./seeds:/usr/src/app/seed/local:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: ghcr.io/yvan2xero/tkams-web:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: production
      PORT: 4173
      SERVER_PUBLIC_URL: ${SERVER_PUBLIC_URL:-http://localhost:3000}
      DEFAULT_ORGANIZATION_SLUG: ${DEFAULT_ORGANIZATION_SLUG:-sgn-institution}
    ports:
      - "${WEB_PORT:-4173}:4173"
    depends_on:
      - server
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-grades}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grades}
      POSTGRES_DB: ${POSTGRES_DB:-grades}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  server_uploads:
  postgres_data:
