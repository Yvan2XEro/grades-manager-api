departments:
- code: EMS
  nameFr: Études Médico-Sanitaires
  nameEn: Medical and Health Studies
  facultyCode: INSES
  studyCycleCode: BTS-SANTE
  description: Filière regroupant les spécialités liées aux soins directs aux patients et à la santé communautaire
    (Sage-femme, Sciences infirmières, Kinésithérapie, Odontostomatologie, Opticien-Lunetier).
- code: STBM
  nameFr: Sciences et Techniques Biomédicales
  nameEn: Biomedical Sciences and Techniques
  facultyCode: INSES
  studyCycleCode: BTS-SANTE
  description: Filière regroupant les spécialités techniques de support au diagnostic et au traitement
    (Techniques de laboratoire et d'analyse médicale, Techniques pharmaceutiques, Radiologie et imagerie
    médicale).
programs:
- code: SFM
  nameFr: Sage-femme
  nameEn: Midwifery
  departmentCode: EMS
  studyCycleCode: BTS-SANTE
  facultyCode: INSES
  durationYears: 3
  totalCredits: 180
  totalHours: 2700
  diplomaTitle: Brevet de Technicien Supérieur - Sage-femme
  objective: Former des professionnelles de santé ayant pour mission d'accompagner les femmes enceintes
    tout au long de leur grossesse, de l'établissement du diagnostic jusqu'au jour de l'accouchement,
    d'animer les séances de préparation à l'accouchement et d'assurer seule l'accouchement. La Sage-femme
    assure également le suivi gynécologique de la femme.
  careerOpportunities:
  - Fonction publique
  - Hôpitaux et cliniques privées
  - ONG
  - Auto-emploi
  - Médecine du travail
  - Recherche et formation
  - PMI
  note: L'UE SFM232 (Dystocies – Pathologies obstétricales – Complications obstétricales) a une cellule
    'crédits' vide dans le document MINESUP original ; valeur fixée à 7 crédits pour atteindre les 30
    crédits réglementaires du semestre 3.
- code: SIN
  nameFr: Sciences Infirmières
  nameEn: Nursing Sciences
  departmentCode: EMS
  studyCycleCode: BTS-SANTE
  facultyCode: INSES
  durationYears: 3
  totalCredits: 180
  totalHours: 2700
  diplomaTitle: Brevet de Technicien Supérieur - Sciences Infirmières
  objective: Former des infirmiers et infirmières polyvalents capables d'assurer des soins de qualité
    aux patients dans tous les contextes cliniques et communautaires, en hôpital comme en milieu rural.
  careerOpportunities:
  - Hôpitaux publics et privés
  - Cliniques
  - Centres de santé
  - ONG sanitaires
  - Auto-emploi (cabinets de soins)
  - Santé scolaire
  - Médecine du travail
  - Recherche et formation
  note: Le document officiel attribue 32 crédits au semestre 5 (au lieu de 30) ; valeur conservée telle
    qu'indiquée dans le programme MINESUP.
- code: KIN
  nameFr: Kinésithérapie
  nameEn: Physiotherapy
  departmentCode: EMS
  studyCycleCode: BTS-SANTE
  facultyCode: INSES
  durationYears: 3
  totalCredits: 180
  totalHours: 2700
  diplomaTitle: Brevet de Technicien Supérieur - Kinésithérapie
  objective: Former des kinésithérapeutes capables de prendre en charge la rééducation fonctionnelle,
    la réadaptation et la prévention des déficiences motrices, neurologiques et respiratoires.
  careerOpportunities:
  - Hôpitaux et cliniques
  - Cabinets privés de kinésithérapie
  - Centres de réadaptation
  - Clubs sportifs
  - Auto-emploi
  - ONG
  - Recherche et formation
- code: ODO
  nameFr: Odontostomatologie
  nameEn: Odontostomatology
  departmentCode: EMS
  studyCycleCode: BTS-SANTE
  facultyCode: INSES
  durationYears: 3
  totalCredits: 180
  totalHours: 2700
  diplomaTitle: Brevet de Technicien Supérieur - Odontostomatologie
  objective: Former des thérapeutes dentaires hautement qualifiés capables de fournir des soins dentaires
    holistiques de haute qualité dans les cliniques au niveau local, national ou international.
  careerOpportunities:
  - Cliniques dentaires publiques et privées
  - Cabinets dentaires
  - Hôpitaux
  - ONG
  - Auto-emploi
  - Recherche et formation
- code: OPT
  nameFr: Opticien-Lunetier
  nameEn: Optician
  departmentCode: EMS
  studyCycleCode: BTS-SANTE
  facultyCode: INSES
  durationYears: 3
  totalCredits: 180
  totalHours: 2700
  diplomaTitle: Brevet de Technicien Supérieur - Opticien-Lunetier
  objective: Former des professionnels appelés à lutter contre la malvoyance et la cécité évitable. Ces
    professionnels ont la charge de corriger les défauts visuels avec des lunettes et d'administrer les
    soins oculaires d'urgence.
  careerOpportunities:
  - Cabinets et magasins d'optique
  - Hôpitaux et cliniques ophtalmologiques
  - ONG de lutte contre la cécité
  - Auto-emploi
  - Industrie optique
  note: Le programme officiel laisse certaines UE avec un volume horaire déclaré en semaines (stages,
    recherches) sans crédits explicites, ce qui explique les semestres à 23 ou 27 crédits déclarés (S3,
    S5, S6).
- code: TLB
  nameFr: Techniques de Laboratoire et d'Analyse Médicale
  nameEn: Medical Laboratory and Analysis Techniques
  departmentCode: STBM
  studyCycleCode: BTS-SANTE
  facultyCode: INSES
  durationYears: 3
  totalCredits: 180
  totalHours: 2700
  diplomaTitle: Brevet de Technicien Supérieur - Techniques de Laboratoire et d'Analyse Médicale
  objective: Former des techniciens de laboratoire capables de réaliser des analyses biomédicales (hématologie,
    biochimie, microbiologie, parasitologie, immunologie) au service du diagnostic médical.
  careerOpportunities:
  - Laboratoires d'analyses médicales publics et privés
  - Hôpitaux et cliniques
  - Centres de recherche
  - Industrie pharmaceutique
  - Industrie agroalimentaire
  - Auto-emploi
  - ONG
- code: TPH
  nameFr: Techniques Pharmaceutiques
  nameEn: Pharmaceutical Techniques
  departmentCode: STBM
  studyCycleCode: BTS-SANTE
  facultyCode: INSES
  durationYears: 3
  totalCredits: 180
  totalHours: 2700
  diplomaTitle: Brevet de Technicien Supérieur - Techniques Pharmaceutiques
  objective: Former des techniciens en pharmacie hautement qualifiés, capables de participer à la conception,
    la fabrication, l'administration et la conservation des médicaments sous la direction d'un pharmacien.
  careerOpportunities:
  - Officines (pharmacies)
  - Hôpitaux et pharmacies hospitalières
  - Industrie pharmaceutique
  - Grossistes répartiteurs
  - ONG sanitaires
  - Recherche pharmaceutique
  - Auto-emploi
- code: IMM
  nameFr: Radiologie et Imagerie Médicale
  nameEn: Radiology and Medical Imaging
  departmentCode: STBM
  studyCycleCode: BTS-SANTE
  facultyCode: INSES
  durationYears: 3
  totalCredits: 180
  totalHours: 2700
  diplomaTitle: Brevet de Technicien Supérieur - Radiologie et Imagerie Médicale
  objective: Former des techniciens en imagerie médicale répondant aux besoins actuels des hôpitaux en
    professionnels qualifiés en radiologie conventionnelle, scanographie, IRM, échographie et radiothérapie,
    avec maîtrise des exigences en radioprotection.
  careerOpportunities:
  - Services d'imagerie médicale publics et privés
  - Cliniques radiologiques
  - Centres anti-cancéreux (radiothérapie)
  - Industrie d'équipements médicaux
  - ONG
  - Auto-emploi
  - Recherche et formation

