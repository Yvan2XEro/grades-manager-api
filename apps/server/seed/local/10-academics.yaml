departments:
- code: EMS
  nameFr: Études Médico-Sanitaires
  nameEn: Medical and Health Studies
  facultyCode: INSES
  studyCycleCode: BTS-SANTE
  description: Filière regroupant les spécialités liées aux soins directs aux patients et à la santé communautaire (Sage-femme,
    Sciences infirmières, Kinésithérapie, Odontostomatologie, Opticien-Lunetier).
- code: STBM
  nameFr: Sciences et Techniques Biomédicales
  nameEn: Biomedical Sciences and Techniques
  facultyCode: INSES
  studyCycleCode: BTS-SANTE
  description: Filière regroupant les spécialités techniques de support au diagnostic et au traitement (Techniques de laboratoire
    et d'analyse médicale, Techniques pharmaceutiques, Radiologie et imagerie médicale).
programs:
- code: SFM
  nameFr: Sage-femme
  nameEn: Midwifery
  abbreviation: BTS-SFM
  slug: sage-femme
  description: Former des professionnelles de santé ayant pour mission d'accompagner les femmes enceintes tout au long de
    leur grossesse, de l'établissement du diagnostic jusqu'au jour de l'accouchement, d'animer les séances de préparation
    à l'accouchement et d'assurer seule l'accouchement. La Sage-femme assure également le suivi gynécologique de la femme.
  domainFr: Santé
  domainEn: Health
  specialiteFr: Sage-femme
  specialiteEn: Midwifery
  diplomaTitleFr: Brevet de Technicien Supérieur — Spécialité Sage-femme
  diplomaTitleEn: Higher Technician Diploma — Midwifery
  attestationValidityFr: Diplôme d'État du Cameroun, conforme au Programme National BTS - Volume 6, Avril 2017 (MINESUP).
    Validité permanente sur le territoire national.
  attestationValidityEn: State diploma of Cameroon, compliant with the National BTS Program - Volume 6, April 2017 (MINESUP).
    Permanent validity within the national territory.
  departmentCode: EMS
  studyCycleCode: BTS-SANTE
  facultyCode: INSES
  durationYears: 3
  totalCredits: 180
  totalHours: 2700
  diplomaTitle: Brevet de Technicien Supérieur - Sage-femme
  objective: Former des professionnelles de santé ayant pour mission d'accompagner les femmes enceintes tout au long de leur
    grossesse, de l'établissement du diagnostic jusqu'au jour de l'accouchement, d'animer les séances de préparation à l'accouchement
    et d'assurer seule l'accouchement. La Sage-femme assure également le suivi gynécologique de la femme.
  careerOpportunities:
  - Fonction publique
  - Hôpitaux et cliniques privées
  - ONG
  - Auto-emploi
  - Médecine du travail
  - Recherche et formation
  - PMI
  note: L'UE SFM232 a une cellule 'crédits' vide dans le document MINESUP original ; valeur fixée à 7 crédits pour atteindre
    les 30 crédits réglementaires du semestre 3.
